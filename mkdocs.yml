site_name: Lex Amoris — Euystacio Framework
site_description: An ethical reasoning framework grounded in the Law of Love
site_author: Euystacio
site_url: https://hannesmitterer.github.io/Lex-Amoris-/
repo_name: hannesmitterer/Lex-Amoris-
repo_url: https://github.com/hannesmitterer/Lex-Amoris-
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Lora
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Guide:
    - Core Principles: principles.md
    - The Framework: framework.md
    - The Euystacio Agent: euystacio.md
    - Usage Examples: examples.md
  - API Reference: api.md
  - Contributing: contributing.md
  - Changelog: changelog.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hannesmitterer/Lex-Amoris-

copyright: "Copyright &copy; 2026 Euystacio — GNU GPL v3"
