apiVersion: v1
kind: Service
metadata:
  name: watcher-prometheus
  labels:
    app: kosymbiosis-watcher
    component: monitoring
spec:
  type: ClusterIP
  selector:
    app: kosymbiosis-watcher
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: watcher-alertmanager
  labels:
    app: kosymbiosis-watcher
    component: monitoring
spec:
  type: ClusterIP
  selector:
    app: kosymbiosis-watcher
  ports:
    - name: http
      port: 9093
      targetPort: 9093
      protocol: TCP
