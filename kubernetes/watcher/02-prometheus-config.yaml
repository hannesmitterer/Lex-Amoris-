apiVersion: v1
kind: ConfigMap
metadata:
  name: watcher-prometheus-config
  labels:
    app: kosymbiosis-watcher
    component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'kosymbiosis-sovereign'
        framework: 'lex-amoris'
    
    # Load alert rules
    rule_files:
      - '/etc/prometheus/rules/alert.rules.yml'
    
    # Alertmanager configuration
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - localhost:9093
    
    # Scrape configurations
    scrape_configs:
      # Kosymbiosis sovereign nodes - 10-node backbone
      - job_name: "kosymbiosis-nodes"
        static_configs:
          - targets:
              # Backbone nodes (WLL-enabled)
              - node-am-01:9100  # Amsterdam (hub λ > 0.85)
              - node-kr-03:9100  # Krakau
              - node-sf-04:9100  # Sofia
              - node-rt-05:9100  # Rotterdam
              - node-cv-06:9100  # Cervia
              - node-on-08:9100  # Oldenburg (hub λ > 0.85)
              - node-vs-09:9100  # Vaison
              - node-ds-10:9100  # Donostia
              - node-ar-11:9100  # Arles
              - node-ul-12:9100  # Ulm
            labels:
              network: 'backbone'
              routing: 'wll'
              nsr_enabled: 'true'
      
      # Self-monitoring
      - job_name: "prometheus"
        static_configs:
          - targets:
              - localhost:9090
      
      - job_name: "alertmanager"
        static_configs:
          - targets:
              - localhost:9093
